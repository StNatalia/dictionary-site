<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Словарь: ИИ · Код · Вайбкодинг</title>
<style>
:root {
  --bg: #0d0d18;
  --surface: #16162a;
  --surface2: #1e1e38;
  --border: #2a2a50;
  --text: #e8e8f5;
  --muted: #7878a8;
  --accent: #7c6af7;
  --accent2: #f7a06a;
  --radius: 10px;
}
[data-theme="light"] {
  --bg: #f0f0f8;
  --surface: #ffffff;
  --surface2: #f4f4fc;
  --border: #d0d0e8;
  --text: #1a1a2e;
  --muted: #6060a0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}

/* ── Header ── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px 10px;
}
.header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
h1 {
  font-size: 1.2rem; font-weight: 800; white-space: nowrap;
  background: linear-gradient(135deg, #7c6af7, #f7a06a);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.search-wrap { flex: 1; position: relative; }
#search {
  width: 100%; padding: 8px 16px 8px 36px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 50px; color: var(--text); font-size: 0.9rem; outline: none;
  transition: border-color 0.2s;
}
#search:focus { border-color: var(--accent); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
.theme-btn {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 8px; color: var(--text); padding: 6px 10px;
  cursor: pointer; font-size: 1rem; transition: background 0.2s; flex-shrink: 0;
}
.theme-btn:hover { background: var(--surface2); }

/* ── Category pills ── */
.cats { display: flex; gap: 6px; flex-wrap: wrap; }
.cat-btn {
  padding: 4px 12px; border-radius: 50px; border: 1.5px solid var(--border);
  background: var(--surface); color: var(--muted);
  cursor: pointer; font-size: 0.78rem; font-weight: 600;
  transition: all 0.18s; white-space: nowrap;
}
.cat-btn:hover { border-color: var(--accent); color: var(--text); }
.cat-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

/* ── Stats ── */
.stats { padding: 6px 24px; color: var(--muted); font-size: 0.78rem; }

/* ── List ── */
.list { max-width: 820px; margin: 0 auto; padding: 10px 24px 40px; }

/* ── Term row ── */
details.term {
  border-bottom: 1px solid var(--border);
}
details.term:first-child { border-top: 1px solid var(--border); }

details.term > summary {
  list-style: none;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 6px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
  border-radius: 6px;
}
details.term > summary::-webkit-details-marker { display: none; }
details.term > summary:hover { background: var(--surface); }

.term-arrow {
  font-size: 0.55rem;
  color: var(--muted);
  transition: transform 0.2s;
  flex-shrink: 0;
  width: 14px;
}
details.term[open] > summary .term-arrow { transform: rotate(90deg); }

.term-name {
  font-size: 0.97rem;
  font-weight: 700;
  flex: 1;
}
.term-abbr-inline {
  font-size: 0.78rem;
  color: var(--muted);
  font-weight: 400;
  margin-left: 6px;
}
.tag {
  padding: 2px 9px;
  border-radius: 50px;
  font-size: 0.68rem;
  font-weight: 700;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── Expanded content ── */
.term-body {
  padding: 0 6px 16px 30px;
}
.definition {
  font-size: 0.9rem;
  line-height: 1.65;
  color: var(--muted);
  margin-bottom: 10px;
}

/* ── Expandable example ── */
details.example { display: inline-block; }
details.example > summary {
  list-style: none;
  cursor: pointer;
  font-size: 0.78rem;
  color: var(--accent2);
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border: 1.5px solid var(--accent2);
  border-radius: 50px;
  transition: all 0.15s;
  user-select: none;
}
details.example > summary::-webkit-details-marker { display: none; }
details.example > summary:hover { background: rgba(247,160,106,0.12); }
.ex-arrow { font-size: 0.55rem; transition: transform 0.2s; }
details.example[open] > summary .ex-arrow { transform: rotate(90deg); }

.example-body {
  margin-top: 10px;
  padding: 10px 14px;
  background: var(--surface2);
  border-left: 3px solid var(--accent2);
  border-radius: 0 8px 8px 0;
  font-size: 0.85rem;
  line-height: 1.55;
  color: var(--text);
}

/* ── Tag colours ── */
.tag-ai      { background: rgba(79,70,229,.22);  color:#818cf8; }
.tag-agents  { background: rgba(124,58,237,.22); color:#a78bfa; }
.tag-code    { background: rgba(8,145,178,.22);  color:#38bdf8; }
.tag-env     { background: rgba(5,150,105,.22);  color:#34d399; }
.tag-deploy  { background: rgba(217,119,6,.22);  color:#fbbf24; }
.tag-product { background: rgba(220,38,38,.22);  color:#f87171; }
.tag-vibe    { background: rgba(219,39,119,.22); color:#f472b6; }
.tag-claude  { background: rgba(124,106,247,.22);color:#c4b5fd; }
.tag-marketing { background: rgba(251,146,60,.22); color:#fb923c; }

.no-results {
  text-align: center; padding: 80px 20px;
  color: var(--muted); font-size: 1rem;
}
.hidden { display: none; }

@media (max-width: 600px) {
  .header { padding: 10px 14px 8px; }
  .list { padding: 8px 14px 24px; }
  h1 { font-size: 1rem; }
  .term-abbr-inline { display: none; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>📚 Словарь: ИИ · Код · Вайбкодинг</h1>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>

<div class="stats" id="stats"></div>
<div class="list" id="list"></div>

// ── Rendering ─────────────────────────────────────────────────────────────
const listEl  = document.getElementById('list');
const statsEl = document.getElementById('stats');
const searchEl = document.getElementById('search');

let activeCat = 'all';
let searchQ   = '';

function render() {
  const q = searchQ.toLowerCase().trim();
  const items = T.filter(t => {
    if (activeCat !== 'all' && t.c !== activeCat) return false;
    if (!q) return true;
    return (t.t + ' ' + (t.a||'') + ' ' + t.d + ' ' + (t.e||'')).toLowerCase().includes(q);
  });

  statsEl.textContent = `Показано: ${items.length} из ${T.length} терминов`;

  if (!items.length) {
    listEl.innerHTML = '<div class="no-results">Ничего не найдено. Попробуй другой запрос.</div>';
    return;
  }

  listEl.innerHTML = items.map(t => {
    const cat = CATS[t.c];
    const abbrHtml = t.a ? `<span class="term-abbr-inline">(${t.a})</span>` : '';
    const exHtml = t.e
      ? `<details class="example">
           <summary><span class="ex-arrow">▶</span> Пример из новостей</summary>
           <div class="example-body">${t.e}</div>
         </details>`
      : '';
    return `
      <details class="term">
        <summary>
          <span class="term-arrow">▶</span>
          <span class="term-name">${t.t}${abbrHtml}</span>
          <span class="tag ${cat.cls}">${cat.label}</span>
        </summary>
        <div class="term-body">
          <div class="definition">${t.d}</div>
          ${exHtml}
        </div>
      </details>`;
  }).join('');
}

// Category filter
document.getElementById('cats').addEventListener('click', e => {
  const btn = e.target.closest('.cat-btn');
  if (!btn) return;
  activeCat = btn.dataset.cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

// Search
searchEl.addEventListener('input', e => { searchQ = e.target.value; render(); });

// Theme
let dark = true;
document.getElementById('themeBtn').addEventListener('click', () => {
  dark = !dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('themeBtn').textContent = dark ? '🌙' : '☀️';
});

render();
</script>
